<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIBE CHECK ✦</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #06080f;
    --surface:  #0b0e1a;
    --card:     #0f1220;
    --border:   #1e2235;
    --border-2: #252a3d;

    --teal:     #5bc8c0;
    --lavender: #9b8ec4;
    --gold:     #c8a96e;
    --frost:    #a8c4d4;
    --dim:      #3a4060;
    --text:     #d8dce8;
    --muted:    #505878;

    --glow-teal:     0 0 24px rgba(91,200,192,0.18), 0 0 60px rgba(91,200,192,0.07);
    --glow-lavender: 0 0 24px rgba(155,142,196,0.18), 0 0 60px rgba(155,142,196,0.07);
    --glow-gold:     0 0 24px rgba(200,169,110,0.2),  0 0 60px rgba(200,169,110,0.08);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* Starfield canvas */
  #starCanvas {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  /* Nebula glow */
  .nebula {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background:
      radial-gradient(ellipse 55% 40% at 80% 20%, rgba(91,200,192,0.055) 0%, transparent 70%),
      radial-gradient(ellipse 50% 35% at 15% 75%, rgba(155,142,196,0.05) 0%, transparent 70%),
      radial-gradient(ellipse 40% 30% at 50% 50%, rgba(200,169,110,0.03) 0%, transparent 70%);
    animation: nebulaDrift 18s ease-in-out infinite alternate;
  }
  @keyframes nebulaDrift {
    0%   { transform: scale(1) translateY(0); opacity: 1; }
    100% { transform: scale(1.06) translateY(-12px); opacity: 0.85; }
  }

  /* Subtle scanlines */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 3px,
      rgba(0,0,0,0.04) 3px, rgba(0,0,0,0.04) 4px
    );
    pointer-events: none;
    z-index: 1000;
  }

  .container {
    position: relative;
    z-index: 10;
    max-width: 700px;
    margin: 0 auto;
    padding: 56px 28px 100px;
  }

  /* Header */
  header {
    text-align: center;
    margin-bottom: 56px;
    animation: riseIn 1s cubic-bezier(.22,.68,0,1.2) both;
  }

  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-size: 10px;
    letter-spacing: 3.5px;
    color: var(--teal);
    margin-bottom: 20px;
    opacity: 0.75;
  }
  .eyebrow::before, .eyebrow::after {
    content: '';
    display: block;
    width: 28px;
    height: 1px;
    background: var(--teal);
    opacity: 0.4;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(52px, 11vw, 86px);
    letter-spacing: -1px;
    line-height: 0.92;
    color: var(--text);
  }
  h1 span {
    display: block;
    background: linear-gradient(135deg, var(--teal) 0%, var(--frost) 45%, var(--lavender) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 17px;
    color: var(--muted);
    margin-top: 14px;
    letter-spacing: 0.5px;
  }

  /* Cards */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 32px;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--teal), transparent);
    opacity: 0.35;
  }

  .input-card {
    margin-bottom: 20px;
    animation: riseIn 1s cubic-bezier(.22,.68,0,1.2) 0.15s both;
  }

  .field-label {
    font-size: 9px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--teal);
    opacity: 0.7;
    margin-bottom: 10px;
    display: block;
  }

  textarea {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text);
    font-family: 'Cormorant Garamond', serif;
    font-size: 17px;
    line-height: 1.7;
    padding: 14px 16px;
    resize: none;
    min-height: 96px;
    outline: none;
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  textarea:focus {
    border-color: rgba(91,200,192,0.45);
    box-shadow: 0 0 0 1px rgba(91,200,192,0.1), var(--glow-teal);
  }
  textarea::placeholder { color: var(--dim); font-style: italic; }

  .section-divider {
    height: 1px;
    background: var(--border);
    margin: 24px 0;
  }

  /* Chips */
  .chips-wrap {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .chip {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 1.5px;
    padding: 7px 16px;
    border: 1px solid var(--border-2);
    border-radius: 40px;
    cursor: pointer;
    transition: all 0.2s ease;
    background: transparent;
    color: var(--muted);
    white-space: nowrap;
    user-select: none;
  }
  .chip:hover {
    border-color: var(--teal);
    color: var(--teal);
    background: rgba(91,200,192,0.05);
  }
  .chip.active {
    border-color: var(--teal);
    background: rgba(91,200,192,0.1);
    color: var(--teal);
    box-shadow: var(--glow-teal);
  }
  .chip.other-chip.active {
    border-color: var(--lavender);
    background: rgba(155,142,196,0.1);
    color: var(--lavender);
    box-shadow: var(--glow-lavender);
  }

  .other-input-wrap {
    display: none;
    margin-top: 12px;
    animation: riseIn 0.3s ease both;
  }
  .other-input-wrap.visible { display: block; }

  .other-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid rgba(155,142,196,0.35);
    border-radius: 5px;
    color: var(--text);
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    font-style: italic;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  .other-input:focus {
    border-color: rgba(155,142,196,0.6);
    box-shadow: var(--glow-lavender);
  }
  .other-input::placeholder { color: var(--dim); }

  /* Submit */
  .btn-check {
    width: 100%;
    margin-top: 24px;
    padding: 16px;
    background: transparent;
    border: 1px solid rgba(91,200,192,0.35);
    border-radius: 5px;
    color: var(--teal);
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 4px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }
  .btn-check::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent 0%, rgba(91,200,192,0.07) 50%, transparent 100%);
    transform: translateX(-100%);
    transition: transform 0.5s ease;
  }
  .btn-check:hover {
    border-color: var(--teal);
    box-shadow: var(--glow-teal);
    background: rgba(91,200,192,0.04);
  }
  .btn-check:hover::before { transform: translateX(100%); }
  .btn-check:active { opacity: 0.8; }
  .btn-check:disabled { opacity: 0.3; cursor: not-allowed; }

  .error-msg {
    font-size: 11px;
    letter-spacing: 1px;
    color: #d08080;
    margin-top: 12px;
    display: none;
    padding: 10px 14px;
    background: rgba(208,128,128,0.06);
    border: 1px solid rgba(208,128,128,0.2);
    border-radius: 4px;
  }

  /* Loading */
  .loading-state {
    display: none;
    text-align: center;
    padding: 60px 0;
    animation: fadeIn 0.4s ease both;
  }
  .loading-ring {
    width: 48px;
    height: 48px;
    margin: 0 auto 20px;
    border-radius: 50%;
    border: 1px solid var(--border-2);
    border-top-color: var(--teal);
    animation: spin 2s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text {
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--muted);
    animation: breathe 2s ease-in-out infinite;
  }
  @keyframes breathe {
    0%, 100% { opacity: 0.4; }
    50%       { opacity: 0.9; }
  }

  /* Result */
  .result-card {
    display: none;
    animation: riseIn 0.8s cubic-bezier(.22,.68,0,1.2) both;
  }
  .result-card::before {
    background: linear-gradient(90deg, transparent, var(--lavender), transparent);
  }

  .result-top {
    display: flex;
    align-items: flex-start;
    gap: 20px;
    margin-bottom: 28px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }

  .score-ring {
    position: relative;
    flex-shrink: 0;
    width: 80px;
    height: 80px;
  }
  .score-ring svg {
    position: absolute;
    inset: 0;
    transform: rotate(-90deg);
  }
  .score-ring .track { fill: none; stroke: var(--border-2); stroke-width: 2; }
  .score-ring .fill  {
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    transition: stroke-dashoffset 1.2s cubic-bezier(.22,.68,0,1.2);
  }
  .score-number {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 22px;
    color: var(--text);
  }

  .result-title-block { flex: 1; }
  .result-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 24px;
    letter-spacing: 0.5px;
    color: var(--text);
    line-height: 1.1;
    margin-bottom: 6px;
  }
  .result-sub {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 15px;
    color: var(--muted);
    line-height: 1.4;
  }

  .result-analysis {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    line-height: 1.8;
    color: #b8bdd0;
    margin-bottom: 28px;
  }

  .pairings {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 24px;
  }
  @media (max-width: 480px) { .pairings { grid-template-columns: 1fr; } }

  .pairing {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px 12px;
    transition: border-color 0.2s;
  }
  .pairing:hover { border-color: var(--border-2); }
  .p-emoji  { font-size: 20px; margin-bottom: 8px; display: block; }
  .p-type   { font-size: 8px; letter-spacing: 2.5px; color: var(--muted); text-transform: uppercase; margin-bottom: 5px; }
  .p-value  { font-family: 'Cormorant Garamond', serif; font-size: 14px; color: var(--text); line-height: 1.35; }

  .affirmation {
    background: rgba(155,142,196,0.05);
    border: 1px solid rgba(155,142,196,0.15);
    border-radius: 6px;
    padding: 18px 20px;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 17px;
    color: #a098c0;
    line-height: 1.65;
  }
  .affirmation::before { content: '\201C '; opacity: 0.5; }
  .affirmation::after  { content: ' \201D'; opacity: 0.5; }

  .btn-again {
    width: 100%;
    margin-top: 20px;
    padding: 13px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 2.5px;
    cursor: pointer;
    transition: all 0.25s ease;
    display: none;
  }
  .btn-again:hover { border-color: var(--border-2); color: var(--text); }

  .session-count {
    text-align: center;
    margin-top: 20px;
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--dim);
    display: none;
  }

  /* Corner labels */
  .corner {
    position: fixed;
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--dim);
    pointer-events: none;
    z-index: 5;
    opacity: 0.5;
  }
  .corner-tl { top: 18px; left: 20px; }
  .corner-br { bottom: 18px; right: 20px; }

  @keyframes riseIn {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
</style>
</head>
<body>

<canvas id="starCanvas"></canvas>
<div class="nebula"></div>
<div class="corner corner-tl">VIBE ENGINE v2.6</div>
<div class="corner corner-br">CLAUDE.AI</div>

<div class="container">

  <header>
    <div class="eyebrow">DIAGNOSTIC TOOL</div>
    <h1>VIBE<span>CHECK</span></h1>
    <p class="subtitle">AI-powered mood analysis &amp; guidance</p>
  </header>

  <div class="card input-card">
    <label class="field-label" for="situation">Describe your situation or mood</label>
    <textarea id="situation" placeholder="What's on your mind? It can be as simple or as detailed as you like…" rows="4"></textarea>

    <div class="section-divider"></div>

    <label class="field-label">Select your current energy</label>
    <div class="chips-wrap">
      <button class="chip" data-vibe="chaotic">⚡ Chaotic</button>
      <button class="chip" data-vibe="chill">🌊 Chill</button>
      <button class="chip" data-vibe="anxious">😬 Anxious</button>
      <button class="chip" data-vibe="motivated">🔥 Motivated</button>
      <button class="chip" data-vibe="sad">🌧 Sad</button>
      <button class="chip" data-vibe="weird">🌀 Weird</button>
      <button class="chip other-chip" data-vibe="other">✏️ Other…</button>
    </div>

    <div class="other-input-wrap" id="otherWrap">
      <input type="text" class="other-input" id="otherInput"
             placeholder="Describe your energy in your own words…" maxlength="80">
    </div>

    <button class="btn-check" id="checkBtn">Check My Vibe</button>
    <div class="error-msg" id="errorMsg"></div>
  </div>

  <div class="loading-state" id="loadingState">
    <div class="loading-ring"></div>
    <div class="loading-text">READING YOUR FREQUENCY</div>
  </div>

  <div class="card result-card" id="resultCard">
    <div class="result-top">
      <div class="score-ring">
        <svg viewBox="0 0 80 80">
          <circle class="track" cx="40" cy="40" r="34"/>
          <circle class="fill" cx="40" cy="40" r="34" id="scoreArc"
            stroke-dasharray="213.6" stroke-dashoffset="213.6"/>
        </svg>
        <div class="score-number" id="scoreNum">—</div>
      </div>
      <div class="result-title-block">
        <div class="result-title" id="resultTitle">—</div>
        <div class="result-sub"   id="resultSub">—</div>
      </div>
    </div>
    <div class="result-analysis" id="resultAnalysis"></div>
    <div class="pairings"        id="pairings"></div>
    <div class="affirmation"     id="affirmation"></div>
  </div>

  <button class="btn-again"    id="againBtn">↩ Check another vibe</button>
  <div class="session-count"   id="sessionCount"></div>

</div>

<script>
/* ── Starfield ── */
(function () {
  const canvas = document.getElementById('starCanvas');
  const ctx    = canvas.getContext('2d');
  let stars    = [];

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }

  function init() {
    resize();
    stars = Array.from({ length: 140 }, () => ({
      x:     Math.random() * canvas.width,
      y:     Math.random() * canvas.height,
      r:     Math.random() * 1.1 + 0.2,
      a:     Math.random(),
      speed: Math.random() * 0.004 + 0.002,
      phase: Math.random() * Math.PI * 2
    }));
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const t = Date.now() / 1000;
    for (const s of stars) {
      const alpha = s.a * (0.5 + 0.5 * Math.sin(t * s.speed * 6 + s.phase));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(168,196,212,${alpha})`;
      ctx.fill();
    }
    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', init);
  init();
  draw();
})();

/* ── App ── */
const SYSTEM_PROMPT = `You are VIBE CHECK, a thoughtful and insightful AI mood analysis engine with a calm, wise voice.
When given a user's situation and energy level, respond ONLY with valid JSON (no markdown, no extra text) in exactly this format:

{
  "score": <number 1-99>,
  "title": <3-5 word vibe name, Title Case>,
  "subtitle": <one evocative 6-10 word descriptor phrase>,
  "analysis": <2-3 sentences of honest, specific, warm-but-insightful analysis. Be genuine, not generic.>,
  "pairings": [
    {"icon": "<emoji>", "type": "Song",     "value": "<Artist — Song Title>"},
    {"icon": "<emoji>", "type": "Snack",    "value": "<specific snack recommendation>"},
    {"icon": "<emoji>", "type": "Activity", "value": "<specific grounding activity>"}
  ],
  "affirmation": <one honest, quietly encouraging observation tailored to their exact situation. Warm, not performatively cheerful.>
}

Score guide: 70+ is positive/high energy, 40–69 is mixed/neutral, below 40 is low/struggling.`;

let selectedVibe = '';
let checkCount   = 0;

document.querySelectorAll('.chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    selectedVibe = chip.dataset.vibe;

    const wrap = document.getElementById('otherWrap');
    if (selectedVibe === 'other') {
      wrap.classList.add('visible');
      document.getElementById('otherInput').focus();
    } else {
      wrap.classList.remove('visible');
    }
  });
});

document.getElementById('checkBtn').addEventListener('click', checkVibe);
document.getElementById('situation').addEventListener('keydown', e => {
  if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) checkVibe();
});

async function checkVibe() {
  const situation = document.getElementById('situation').value.trim();
  const errorMsg  = document.getElementById('errorMsg');
  errorMsg.style.display = 'none';

  if (!situation) {
    errorMsg.textContent = 'Please describe your situation before checking your vibe.';
    errorMsg.style.display = 'block';
    return;
  }

  let energyLabel = selectedVibe;
  if (selectedVibe === 'other') {
    const custom = document.getElementById('otherInput').value.trim();
    energyLabel  = custom || 'other (unspecified)';
  }

  const prompt = `Situation: ${situation}${energyLabel ? `\nEnergy level: ${energyLabel}` : ''}`;

  document.getElementById('loadingState').style.display = 'block';
  document.getElementById('resultCard').style.display   = 'none';
  document.getElementById('againBtn').style.display     = 'none';
  document.getElementById('checkBtn').disabled          = true;

  try {
    const res  = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    const data   = await res.json();
    const text   = (data.content || []).map(i => i.text || '').join('');
    const clean  = text.replace(/```json|```/g, '').trim();
    const result = JSON.parse(clean);

    displayResult(result);
    checkCount++;
    if (checkCount > 1) {
      const el = document.getElementById('sessionCount');
      el.textContent = `${checkCount} vibes checked this session`;
      el.style.display = 'block';
    }

  } catch (err) {
    errorMsg.textContent = `Could not analyze vibe — ${err.message}`;
    errorMsg.style.display = 'block';
    document.getElementById('loadingState').style.display = 'none';
  } finally {
    document.getElementById('checkBtn').disabled = false;
  }
}

function displayResult(r) {
  document.getElementById('loadingState').style.display = 'none';

  const score  = Math.max(1, Math.min(99, r.score));
  const circ   = 213.6;
  const offset = circ * (1 - score / 99);
  const arc    = document.getElementById('scoreArc');

  arc.style.stroke          = score >= 70 ? '#5bc8c0' : score >= 45 ? '#c8a96e' : '#c07878';
  arc.style.strokeDashoffset = circ;
  document.getElementById('scoreNum').textContent = score;
  setTimeout(() => { arc.style.strokeDashoffset = offset; }, 80);

  document.getElementById('resultTitle').textContent    = r.title;
  document.getElementById('resultSub').textContent      = r.subtitle;
  document.getElementById('resultAnalysis').textContent = r.analysis;
  document.getElementById('affirmation').textContent    = r.affirmation;

  document.getElementById('pairings').innerHTML = (r.pairings || []).map(p => `
    <div class="pairing">
      <span class="p-emoji">${p.icon}</span>
      <div class="p-type">${p.type}</div>
      <div class="p-value">${p.value}</div>
    </div>
  `).join('');

  document.getElementById('resultCard').style.display = 'block';
  document.getElementById('againBtn').style.display   = 'block';
  document.getElementById('resultCard').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

document.getElementById('againBtn').addEventListener('click', () => {
  document.getElementById('resultCard').style.display = 'none';
  document.getElementById('againBtn').style.display   = 'none';
  document.getElementById('situation').value          = '';
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  document.getElementById('otherWrap').classList.remove('visible');
  document.getElementById('otherInput').value = '';
  selectedVibe = '';
